all:
  hosts:
    rag-server:
      ansible_host: YOUR_SERVER_IP        # e.g. 192.168.1.100 or EC2 public IP
      ansible_user: ubuntu                # default for Ubuntu on AWS/DigitalOcean
      ansible_ssh_private_key_file: ~/.ssh/id_rsa

  vars:
    app_dir: /opt/rag-chatbot
    app_user: ubuntu
    app_port: 8000
    frontend_port: 3000
