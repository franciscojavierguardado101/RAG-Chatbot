apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: rag-chatbot
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: rag-chatbot-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: rag-chatbot-secrets
                  key: openai-api-key
            - name: CHROMA_PATH
              valueFrom:
                configMapKeyRef:
                  name: rag-chatbot-config
                  key: CHROMA_PATH
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          volumeMounts:
            - name: chroma-storage
              mountPath: /app/chroma_db
      volumes:
        - name: chroma-storage
          emptyDir: {}
          # Production: replace emptyDir with a PersistentVolumeClaim
          # to persist vector data across pod restarts
